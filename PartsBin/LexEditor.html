<!DOCTYPE html>
<html>
<body>
<div tabindex="-1" data-lively-node-type="morph-node" style="-webkit-transform: rotate(0deg) scale(0.85, 0.85); -moz-transform: rotate(0deg) scale(0.85, 0.85); -o-transform: rotate(0deg) scale(0.85, 0.85); -webkit-transform-origin: 0px 0px; -moz-transform-origin: 0px 0px; -o-transform-origin: 0px 0px; position: absolute; left: 5px; top: 5px;">
  <div id="lex-editor-container" class="Morph Box" data-lively-morphid="LEXED001-0001-0001-0001-LEXEDITOR0001" style="position: absolute; left: 0px; top: 0px; width: 600px; height: 400px; background-color: rgb(255, 255, 255); opacity: 1; border: 1px solid rgb(153, 153, 153); border-radius: 4px; padding: 0px; overflow: hidden;">
    
    <!-- Title Bar -->
    <div style="position: absolute; left: 0px; top: 0px; width: 600px; height: 24px; background: linear-gradient(to bottom, rgb(220, 220, 220), rgb(180, 180, 180)); border-bottom: 1px solid rgb(100, 100, 100); display: flex; align-items: center; padding: 0 8px; user-select: none;">
      <span style="font-family: Helvetica, Arial, sans-serif; font-size: 12px; font-weight: bold; color: rgb(60, 60, 60);">LexEditor - Rich Text Editor</span>
    </div>
    
    <!-- Toolbar Container -->
    <div id="lex-toolbar-placeholder" style="position: absolute; left: 0px; top: 24px; width: 600px; height: 50px; background-color: rgb(245, 245, 245); border-bottom: 1px solid rgb(200, 200, 200); overflow-y: auto; overflow-x: auto; padding: 4px;">
      <!-- Toolbar will be injected here by LexicalToolbar.js -->
    </div>
    
    <!-- Editor Content Area -->
    <div id="lex-editor-content" style="position: absolute; left: 0px; top: 74px; width: 600px; height: 326px; background-color: rgb(255, 255, 255); overflow: auto; padding: 8px; box-sizing: border-box;">
      <!-- Lexical editor will attach contenteditable div here -->
      <div id="lex-editor-root" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; font-size: 14px; color: rgb(50, 50, 50); line-height: 1.5; outline: none; min-height: 100%; word-wrap: break-word;" contenteditable="true" spellcheck="true">
        <p style="margin: 0 0 12px 0;">Start typing here...</p>
      </div>
    </div>
    
    <!-- Status Bar (optional) -->
    <div style="position: absolute; left: 0px; bottom: 0px; width: 600px; height: 18px; background-color: rgb(245, 245, 245); border-top: 1px solid rgb(200, 200, 200); font-family: Monospace; font-size: 11px; color: rgb(100, 100, 100); padding: 2px 4px; box-sizing: border-box; display: flex; align-items: center;">
      <span>Ready</span>
    </div>
  </div>
</div>
</body>
</html>
